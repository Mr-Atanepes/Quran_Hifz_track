<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Kur'an Hıfz Takibi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --not-started: #475569;
      --not-started-hover: #64748b;
      --in-progress: #f59e0b;
      --in-progress-hover: #fbbf24;
      --memorized: #10b981;
      --memorized-hover: #34d399;
      --progress-bg: #334155;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-secondary);
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--bg-card);
      box-shadow: 0 4px 6px var(--shadow);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--memorized) 0%, var(--in-progress) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .progress-label {
      font-size: 0.75rem;
      font-weight: 600;
      min-width: 85px;
      text-align: right;
    }

    .progress-label.in-progress {
      color: var(--in-progress);
    }

    .progress-label.memorized {
      color: var(--memorized);
    }

    .progress-bar-container {
      flex: 1;
      height: 10px;
      background: var(--progress-bg);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .progress-bar.in-progress {
      background: var(--in-progress);
    }

    .progress-bar.memorized {
      background: var(--memorized);
    }

    .progress-count {
      font-size: 0.8rem;
      font-weight: 700;
      min-width: 90px;
      text-align: left;
    }

    .progress-count.in-progress {
      color: var(--in-progress);
    }

    .progress-count.memorized {
      color: var(--memorized);
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
    }

    .legend-dot.not-started {
      background: var(--not-started);
    }

    .legend-dot.in-progress {
      background: var(--in-progress);
    }

    .legend-dot.memorized {
      background: var(--memorized);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    @media (min-width: 480px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
      
      .header {
        padding: 1.5rem 2rem;
      }
      
      .main {
        padding: 1.5rem 2rem;
      }
      
      .title {
        font-size: 1.75rem;
      }

      .progress-label {
        font-size: 0.85rem;
        min-width: 95px;
      }

      .progress-count {
        font-size: 0.85rem;
        min-width: 100px;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    /* Surah Card */
    .surah-card {
      position: relative;
      padding: 1rem 0.75rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 80px;
      justify-content: center;
    }

    .surah-card:active {
      transform: scale(0.95);
    }

    .surah-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px var(--shadow);
    }

    .surah-card.status-0 {
      background: var(--not-started);
    }

    .surah-card.status-0:hover {
      background: var(--not-started-hover);
    }

    .surah-card.status-1 {
      background: var(--in-progress);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .surah-card.status-1:hover {
      background: var(--in-progress-hover);
    }

    .surah-card.status-2 {
      background: var(--memorized);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .surah-card.status-2:hover {
      background: var(--memorized-hover);
    }

    .surah-card.locked {
      cursor: default;
      opacity: 0.9;
    }

    .surah-card.locked:active {
      transform: none;
    }

    .surah-card.locked:hover {
      transform: none;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .surah-number {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.7;
    }

    .surah-name {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .status-indicator {
      font-size: 0.65rem;
      margin-top: 0.35rem;
      opacity: 0.85;
      font-weight: 500;
    }

    .lock-icon {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.7rem;
      opacity: 0.8;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--bg-secondary);
      padding: 2rem 1.5rem;
      border-radius: 20px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 40px var(--shadow);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .modal-content h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .modal-content p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .modal-close {
      background: var(--memorized);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--memorized-hover);
      transform: scale(1.02);
    }

    .modal-close:active {
      transform: scale(0.98);
    }

    /* Status Selection Modal */
    .status-modal-content {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 20px;
      max-width: 300px;
      width: 100%;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 40px var(--shadow);
    }

    .status-modal-header {
      text-align: center;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--bg-card);
    }

    .status-modal-surah-number {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .status-modal-surah-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .status-options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .status-option {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }

    .status-option:hover {
      transform: scale(1.02);
    }

    .status-option.selected {
      border-color: white;
    }

    .status-option.option-0 {
      background: var(--not-started);
    }

    .status-option.option-0:hover {
      background: var(--not-started-hover);
    }

    .status-option.option-1 {
      background: var(--in-progress);
    }

    .status-option.option-1:hover {
      background: var(--in-progress-hover);
    }

    .status-option.option-2 {
      background: var(--memorized);
    }

    .status-option.option-2:hover {
      background: var(--memorized-hover);
    }

    .status-option-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-option.selected .status-option-dot::after {
      content: "";
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
    }

    .status-option-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
    }

    .status-modal-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .status-modal-btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .status-modal-btn.cancel {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .status-modal-btn.cancel:hover {
      background: var(--not-started);
      color: var(--text-primary);
    }

    .status-modal-btn.save {
      background: var(--memorized);
      color: white;
    }

    .status-modal-btn.save:hover {
      background: var(--memorized-hover);
    }

    .status-modal-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Kur'an Hıfzı</h1>
      <div class="progress-section">
        <div class="progress-row">
          <span class="progress-label in-progress">Devam Ediyor</span>
          <div class="progress-bar-container">
            <div class="progress-bar in-progress" id="progress-bar-inprogress"></div>
          </div>
          <span class="progress-count in-progress" id="count-inprogress">0 / 114</span>
        </div>
        <div class="progress-row">
          <span class="progress-label memorized">Tamamlanan</span>
          <div class="progress-bar-container">
            <div class="progress-bar memorized" id="progress-bar-memorized"></div>
          </div>
          <span class="progress-count memorized" id="count-memorized">114 kaldi</span>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot not-started"></span>
          <span>Baslanmadi</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot in-progress"></span>
          <span>Devam Ediyor</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot memorized"></span>
          <span>Tamamlandi</span>
        </div>
      </div>
      <div class="grid" id="surah-grid"></div>
    </main>

    <!-- Completion Modal -->
    <div class="modal" id="completion-modal">
      <div class="modal-content">
        <div class="modal-icon">&#127881;</div>
        <h2>MasaAllah!</h2>
        <p>114 surenin tamamini ezberlediniz</p>
        <button class="modal-close" id="modal-close">Elhamdulillah</button>
      </div>
    </div>

    <!-- Status Selection Modal -->
    <div class="modal" id="status-modal">
      <div class="status-modal-content">
        <div class="status-modal-header">
          <div class="status-modal-surah-number" id="status-modal-number">Sure 1</div>
          <div class="status-modal-surah-name" id="status-modal-name">Fatiha</div>
        </div>
        <div class="status-options">
          <div class="status-option option-0" data-status="0">
            <span class="status-option-dot"></span>
            <span class="status-option-label">Baslanmadi</span>
          </div>
          <div class="status-option option-1" data-status="1">
            <span class="status-option-dot"></span>
            <span class="status-option-label">Devam Ediyor</span>
          </div>
          <div class="status-option option-2" data-status="2">
            <span class="status-option-dot"></span>
            <span class="status-option-label">Tamamlandi</span>
          </div>
        </div>
        <div class="status-modal-buttons">
          <button class="status-modal-btn cancel" id="status-cancel">Iptal</button>
          <button class="status-modal-btn save" id="status-save">Kaydet</button>
        </div>
      </div>
    </div>
  </div>

  <script>

      { id: 110, name: "Nasr" },
      { id: 111, name: "Tebbet" },
      { id: 112, name: "Ihlas" },
      { id: 113, name: "Felak" },
      { id: 114, name: "Nas" }
    ];

    const STATUS_LABELS = {
      0: "Baslanmadi",
      1: "Devam Ediyor",
      2: "Tamamlandi"
    };

    const STORAGE_KEY = "quran_memorization_state";

    // State management
    let surahStates = {};
    let currentSurahId = null;
    let selectedStatus = null;

    // Initialize state from localStorage or defaults
    function initializeState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      
      if (saved) {
        try {
          surahStates = JSON.parse(saved);
          SURAHS.forEach(surah => {
            if (surahStates[surah.id] === undefined) {
              surahStates[surah.id] = 0;
            }
          });
        } catch (e) {
          initializeDefaultState();
        }
      } else {
        initializeDefaultState();
      }
      
      saveState();
    }

    function initializeDefaultState() {
      surahStates = {};
      SURAHS.forEach(surah => {
        surahStates[surah.id] = 0;
      });
    }

    // Save state to localStorage
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(surahStates));
    }

    // Open status selection modal
    function openStatusModal(surahId) {
      // If already memorized (locked), don't open modal
      if (surahStates[surahId] === 2) {
        return;
      }

      currentSurahId = surahId;
      const surah = SURAHS.find(s => s.id === surahId);
      
      document.getElementById("status-modal-number").textContent = `Sure ${surah.id}`;
      document.getElementById("status-modal-name").textContent = surah.name;
      
      // Set current status as selected
      selectedStatus = surahStates[surahId];
      updateStatusOptions();
      
      document.getElementById("status-modal").classList.add("show");
    }

    // Update status option selection UI
    function updateStatusOptions() {
      document.querySelectorAll(".status-option").forEach(option => {
        const status = parseInt(option.dataset.status);
        option.classList.toggle("selected", status === selectedStatus);
      });
    }

    // Close status modal
    function closeStatusModal() {
      document.getElementById("status-modal").classList.remove("show");
      currentSurahId = null;
      selectedStatus = null;
    }

    // Save selected status
    function saveSelectedStatus() {
      if (currentSurahId !== null && selectedStatus !== null) {
        surahStates[currentSurahId] = selectedStatus;
        saveState();
        renderCard(currentSurahId);
        updateProgress();
        checkCompletion();
      }
      closeStatusModal();
    }

    // Calculate progress
    function calculateProgress() {
      const values = Object.values(surahStates);
      const inProgressCount = values.filter(s => s === 1).length;
      const memorizedCount = values.filter(s => s === 2).length;
      const remaining = 114 - memorizedCount;
      return { 
        inProgressCount, 
        memorizedCount,
        remaining,
        inProgressPercentage: (inProgressCount / 114) * 100,
        memorizedPercentage: (memorizedCount / 114) * 100
      };
    }

    // Update progress display
    function updateProgress() {
      const { inProgressCount, memorizedCount, remaining, inProgressPercentage, memorizedPercentage } = calculateProgress();
      
      document.getElementById("count-inprogress").textContent = `${inProgressCount} / 114`;
      
      // Show remaining count for memorized, decreasing as they complete
      if (memorizedCount === 0) {
        document.getElementById("count-memorized").textContent = `114 kaldi`;
      } else if (remaining === 0) {
        document.getElementById("count-memorized").textContent = `Tamamlandi!`;
      } else {
        document.getElementById("count-memorized").textContent = `${remaining} kaldi`;
      }
      
      document.getElementById("progress-bar-inprogress").style.width = `${inProgressPercentage}%`;
      document.getElementById("progress-bar-memorized").style.width = `${memorizedPercentage}%`;
    }

    // Check if all surahs are memorized
    function checkCompletion() {
      const { memorizedCount } = calculateProgress();
      if (memorizedCount === 114) {
        showCompletionModal();
      }
    }

    // Show completion modal
    function showCompletionModal() {
      document.getElementById("completion-modal").classList.add("show");
    }

    // Hide completion modal
    function hideCompletionModal() {
      document.getElementById("completion-modal").classList.remove("show");
    }

    // Render a single card
    function renderCard(surahId) {
      const card = document.querySelector(`[data-surah-id="${surahId}"]`);
      if (!card) return;
      
      const status = surahStates[surahId];
      const isLocked = status === 2;
      
      card.className = `surah-card status-${status}${isLocked ? ' locked' : ''}`;
      card.querySelector(".status-indicator").textContent = STATUS_LABELS[status];
      
      // Add or remove lock icon
      let lockIcon = card.querySelector(".lock-icon");
      if (isLocked && !lockIcon) {
        lockIcon = document.createElement("span");
        lockIcon.className = "lock-icon";
        lockIcon.innerHTML = "&#128274;";
        card.appendChild(lockIcon);
      } else if (!isLocked && lockIcon) {
        lockIcon.remove();
      }
    }

    // Render all cards
    function renderGrid() {
      const grid = document.getElementById("surah-grid");
      grid.innerHTML = "";
      
      SURAHS.forEach(surah => {
        const status = surahStates[surah.id];
        const isLocked = status === 2;
        
        const card = document.createElement("div");
        card.className = `surah-card status-${status}${isLocked ? ' locked' : ''}`;
        card.dataset.surahId = surah.id;
        
        card.innerHTML = `
          <span class="surah-number">${surah.id}</span>
          <span class="surah-name">${surah.name}</span>
          <span class="status-indicator">${STATUS_LABELS[status]}</span>
          ${isLocked ? '<span class="lock-icon">&#128274;</span>' : ''}
        `;
        
        card.addEventListener("click", () => openStatusModal(surah.id));
        grid.appendChild(card);
      });
    }

    // Initialize app
    function init() {
      initializeState();
      renderGrid();
      updateProgress();
      
      // Completion modal events
      document.getElementById("modal-close").addEventListener("click", hideCompletionModal);
      document.getElementById("completion-modal").addEventListener("click", (e) => {
        if (e.target.id === "completion-modal") hideCompletionModal();
      });
      
      // Status modal events
      document.querySelectorAll(".status-option").forEach(option => {
        option.addEventListener("click", () => {
          selectedStatus = parseInt(option.dataset.status);
          updateStatusOptions();
        });
      });
      
      document.getElementById("status-cancel").addEventListener("click", closeStatusModal);
      document.getElementById("status-save").addEventListener("click", saveSelectedStatus);
      document.getElementById("status-modal").addEventListener("click", (e) => {
        if (e.target.id === "status-modal") closeStatusModal();
      });
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
